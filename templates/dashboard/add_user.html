{% extends "base.html" %}
{% block content%}
{% load crispy_forms_tags %}

<div class="row">
 <div class="col-md-3">
        {% include 'dashboard/sidebar.html' %}
    </div>
<!--Right side content-->
<div class="col-md-9">
    {% if perms.auth.add_user %}
  <h2>Add New User</h2>
    <form action="{% url 'add_user' %}" method="POST">
        {% csrf_token %}
        {{form | crispy }}
        <button type="submit" class="btn btn-warning"> Submit </button>
    </form>
    <br>
    {% else%}
    <h5> Don't have permission to view the page </h5>
    {% endif %}
</div>
</div>
{% endblock %}
